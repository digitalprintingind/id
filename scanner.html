    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #111029, #05030a);
        }
        .ai-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
        .ai-glow-strong { box-shadow: 0 0 30px rgba(168, 85, 247, 0.4); }
        
        #camera-feed { object-fit: cover; }
        .mirror-view { transform: scaleX(-1); }
        
        /* Wadah preview menggunakan Flexbox untuk Centering Sempurna */
        .preview-window {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 480px;
            background: #06060c; 
            border-radius: 1rem;
            border: 1px solid #1f2937;
        }
        
        /* Kontainer Kanvas Relatif */
        .canvas-container {
            position: relative;
            transform-origin: center center;
            user-select: none;
            touch-action: none;
            cursor: grab;
            transition: transform 0.05s ease-out; 
        }
        .canvas-container:active { cursor: grabbing; transition: none; }

        /* Gaya Toggle Switch Modern */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #374151; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #6366f1; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between overflow-x-hidden">

                    <i class="fa-solid fa-rotate text-indigo-400 text-base"></i>

                            <i class="fa-solid fa-arrow-rotate-left"></i>

                        <button onclick="redoCrop()" id="btn-crop-redo" class="w-8 h-8 flex items-center justify-center bg-gray-800 hover:bg-gray-700 text-emerald-400 rounded-lg transition disabled:opacity-30 disabled:cursor-not-allowed" disabled>

                <div class="grid grid-cols-2 gap-3">

                    <button onclick="applyWarpCrop()" class="bg-purple-600 hover:bg-purple-500 text-white p-3 rounded-xl transition text-sm font-bold cursor-pointer flex items-center justify-center gap-2 border border-purple-400">
                        <i class="fa-solid fa-check-double"></i> Selesai
                    </button>
                </div>
            </div>

            <div class="w-full flex flex-col gap-3" id="action-download-panel">
                <div class="flex justify-between items-center bg-gray-900 border border-gray-800 p-3 rounded-xl">
                    <span class="text-xs font-medium text-gray-400"><i class="fa-solid fa-compress mr-1"></i> Size PDF:</span>
                    <select id="compress-level" class="bg-gray-800 text-white border border-gray-700 text-xs font-semibold rounded-lg px-2 py-1 outline-none focus:border-indigo-500 transition cursor-pointer">
                        <option value="hd">Asli</option>
                        <option value="med">Medium (~1 MB)</option>
                        <option value="low">Rendah (< 500 KB)</option>
                    </select>
                </div>
                <button id="btn-pdf" onclick="t1_d_p()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition shadow-lg shadow-indigo-500/20 cursor-pointer text-sm tracking-wide">
                    <i class="fa-solid fa-file-pdf text-lg"></i>
                    UNDUH DOKUMEN PDF

    </main>

    <script>
        // === [BAGIAN PROTEKSI - JANGAN DIUBAH] ===

        }
        if(!v_i_c()) { document.body.innerHTML = '<div style="color:white;text-align:center;margin-top:100px;font-family:sans-serif;"><h1>APP_CORRUPTED_ERROR_0xCR</h1><p>Integritas kode rusak.</p></div>'; throw "StopJS"; }
        // ===========================================

        let img_obj = null;
        let stream_ptr = null; 
        let currentFacingMode = "environment"; 
        
        // State Rotasi & Crop
        let rotationAngle = 0; 
        let isCropModeActive = false;
        let warpCorners = [{x:0,y:0}, {x:0,y:0}, {x:0,y:0}, {x:0,y:0}];
        let activeCornerIndex = -1;
        const cornerHandleRadius = 16; 
        
        // State Drag Keseluruhan Area Crop
        let isDraggingWholeCrop = false;
        let lastCropDragPos = { x: 0, y: 0 };
        let isCropStateSavedForDrag = false; // Penanda agar Undo Crop hanya merekam 1 tarikan geser

        // MANAJEMEN RIWAYAT UNDO / REDO (GLOBAL GAMBAR)
        let undoStack = [];
        let redoStack = [];
        const maxHistorySize = 15;

        // MANAJEMEN RIWAYAT UNDO / REDO (KHUSUS CROP WARP LINE)
        let cropUndoStack = [];
        let cropRedoStack = [];

        // Viewport Zoom & Pan
        let zoomScale = 1.0;
        let defaultFitScale = 1.0; 
        let panOffset = { x: 0, y: 0 };
        let isPanningView = false;
        let panStart = { x: 0, y: 0 };
        let initialPinchDist = null;

        // Deklarasi Elemen
        const zone_choice = document.getElementById('choice-zone');
        const zone_camera = document.getElementById('camera-zone');
        const zone_preview = document.getElementById('preview-zone');
        const video_feed = document.getElementById('camera-feed');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const oCtx = overlayCanvas.getContext('2d');
        const canvas_wrap = document.getElementById('canvas-wrap');
        const view_window = document.getElementById('view-window');
        const ai_loading = document.getElementById('ai-loading');

        // --- SISTEM PANEL SETTING & IMAGE PROCESSING STATE ---
        let isSettingsOpen = false;

        function toggleSettingsPanel() {
            const panel = document.getElementById('settings-panel');
            isSettingsOpen = !isSettingsOpen;
            if (isSettingsOpen) {
                panel.style.transform = 'translate-x(0)';
                panel.style.opacity = '1';
                panel.classList.remove('translate-x-[350px]', 'opacity-0');
            } else {
                panel.classList.add('translate-x-[350px]', 'opacity-0');
                panel.style.opacity = '0';
            }
        }

        function updateSharpnessUI(value) {
            document.getElementById('sharpness-value').innerText = value + '%';
        }

        // Fungsi pemicu render ulang ketika setting diubah
        function updateImageProcessing() {
            if (!img_obj) return;
            
            // Tutup mode crop jika aktif agar tidak bentrok saat processing
            if (isCropModeActive) cancelCrop();
            
            ai_loading.classList.remove('hidden');
            
            // Beri sedikit delay agar UI tidak freeze
            setTimeout(() => {
                renderFinalOutput();
                calculateAndSetInitialFitScale();
                saveStateToHistory(); // Simpan perubahan efek ke history
                ai_loading.classList.add('hidden');
            }, 50);
        }

        // --- SISTEM KAMERA & UPLOAD ---
        function resetApp() {
            stopCamera();
            img_obj = null;
            rotationAngle = 0;
            isCropModeActive = false;
            undoStack = [];
            redoStack = [];
            cropUndoStack = [];
            cropRedoStack = [];
            updateHistoryButtons();
            
            // Reset Settings
            document.getElementById('setting-bw').checked = false;
            document.getElementById('setting-sharpness').value = 0;
            updateSharpnessUI(0);
            
            // Sembunyikan tombol setting
            document.getElementById('btn-global-settings').classList.add('hidden');
            if (isSettingsOpen) toggleSettingsPanel(); // Tutup panel jika terbuka

            document.getElementById('file-input').value = "";
            document.getElementById('normal-editor-tools').classList.remove('hidden');
            document.getElementById('crop-active-tools').classList.add('hidden');
            document.getElementById('editor-title-status').innerText = "Scanner Preview";
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            
            zone_choice.classList.remove('hidden');
            zone_camera.classList.add('hidden');
            zone_preview.classList.add('hidden');
        }

        async function startCamera() {
            if(!v_i_c() || _0xcr_k !== "Q29kZU9uIGJ5X3JpZHdhbg==") { window.location.reload(); return; }
            zone_choice.classList.add('hidden');
            zone_camera.classList.remove('hidden');
            if (stream_ptr) stopCamera();

            if (currentFacingMode === "user") video_feed.classList.add('mirror-view');
            else video_feed.classList.remove('mirror-view');

            try {
                stream_ptr = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false 
                });
                video_feed.srcObject = stream_ptr;

        }

        function switchCamera() {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            startCamera();
        }

        function stopCamera() {
            if (stream_ptr) { stream_ptr.getTracks().forEach(track => track.stop()); stream_ptr = null; video_feed.srcObject = null; }
        }

        function takePhoto() {
            const temp_canvas = document.createElement('canvas');
            temp_canvas.width = video_feed.videoWidth; temp_canvas.height = video_feed.videoHeight;
            const temp_ctx = temp_canvas.getContext('2d');
            temp_ctx.save();
            if (currentFacingMode === "user") { temp_ctx.translate(temp_canvas.width, 0); temp_ctx.scale(-1, 1); }
            temp_ctx.drawImage(video_feed, 0, 0, temp_canvas.width, temp_canvas.height);
            temp_ctx.restore();

            img_obj = new Image();
            img_obj.onload = function() {
                stopCamera();
                zone_camera.classList.add('hidden'); 
                zone_preview.classList.remove('hidden');
                document.getElementById('btn-global-settings').classList.remove('hidden'); // Munculkan setting
                
                renderFinalOutput();
                calculateAndSetInitialFitScale(); 
                saveStateToHistory(); 
            };
            img_obj.src = temp_canvas.toDataURL('image/jpeg', 1.0);
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                img_obj = new Image();
                img_obj.onload = function() {
                    zone_choice.classList.add('hidden'); 
                    zone_preview.classList.remove('hidden');
                    document.getElementById('btn-global-settings').classList.remove('hidden'); // Munculkan setting
                    
                    renderFinalOutput();
                    calculateAndSetInitialFitScale(); 
                    saveStateToHistory(); 
                };
                img_obj.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // --- SISTEM UNDO REDO GLOBAL GAMBAR ---
        function saveStateToHistory() {
            if (!canvas) return;
            if (undoStack.length >= maxHistorySize) undoStack.shift();
            undoStack.push({ imageSrc: canvas.toDataURL('image/jpeg', 1.0), rot: rotationAngle });
            redoStack = []; 
            updateHistoryButtons();

        function undo() {
            if (undoStack.length <= 1) return; 
            if (isCropModeActive) cancelCrop();

            const currentState = undoStack.pop();
            redoStack.push(currentState);
            
            const previousState = undoStack[undoStack.length - 1];
            loadStateFromHistory(previousState);
        }

        function redo() {
            if (redoStack.length === 0) return;
            if (isCropModeActive) cancelCrop();

            const nextState = redoStack.pop();
            undoStack.push(nextState);
            loadStateFromHistory(nextState);

        function loadStateFromHistory(stateObj) {

                calculateAndSetInitialFitScale();

        }

        function updateHistoryButtons() {
            document.getElementById('btn-undo').disabled = (undoStack.length <= 1);
            document.getElementById('btn-redo').disabled = (redoStack.length === 0);
        }

        function rotateImage() {
            if (isCropModeActive) cancelCrop(); 
            rotationAngle = (rotationAngle + 90) % 360;
            renderFinalOutput();
            calculateAndSetInitialFitScale(); 
            saveStateToHistory();
        }

        // --- SISTEM UNDO REDO KHUSUS MODE CROP ---
        function cloneCorners(corners) {
            return corners.map(c => ({x: c.x, y: c.y}));
        }

        function saveCropState() {
            cropUndoStack.push(cloneCorners(warpCorners));
            cropRedoStack = [];
            updateCropHistoryButtons();
        }

        function undoCrop() {
            if (cropUndoStack.length === 0) return;
            cropRedoStack.push(cloneCorners(warpCorners));
            warpCorners = cropUndoStack.pop();
            updateCropHistoryButtons();
            drawUIOverlay();
        }

        function redoCrop() {
            if (cropRedoStack.length === 0) return;
            cropUndoStack.push(cloneCorners(warpCorners));
            warpCorners = cropRedoStack.pop();
            updateCropHistoryButtons();
            drawUIOverlay();
        }

        function updateCropHistoryButtons() {
            const btnUndo = document.getElementById('btn-crop-undo');
            const btnRedo = document.getElementById('btn-crop-redo');
            if (btnUndo) btnUndo.disabled = (cropUndoStack.length === 0);
            if (btnRedo) btnRedo.disabled = (cropRedoStack.length === 0);
        }

        // --- ZOOM & PAN (FLEXBOX CENTERING & CLAMPING) ---
        function applyZoomPanStyle() {
            const winW = view_window.clientWidth; 
            const winH = view_window.clientHeight;
            const scaledW = canvas.width * zoomScale; 
            const scaledH = canvas.height * zoomScale;
            
            const maxPanX = Math.max(0, (scaledW - winW) / 2);
            const maxPanY = Math.max(0, (scaledH - winH) / 2);

            panOffset.x = Math.max(-maxPanX, Math.min(maxPanX, panOffset.x));
            panOffset.y = Math.max(-maxPanY, Math.min(maxPanY, panOffset.y));

            canvas_wrap.style.transform = `translate(${panOffset.x}px, ${panOffset.y}px) scale(${zoomScale})`;
        }

        function calculateAndSetInitialFitScale() {
            const winW = view_window.clientWidth; 
            const winH = view_window.clientHeight;
            const scaleW = winW / canvas.width; 
            const scaleH = winH / canvas.height;
            
            defaultFitScale = Math.min(scaleW, scaleH) * 0.95; 
            zoomScale = defaultFitScale;
            panOffset = { x: 0, y: 0 };
            applyZoomPanStyle();
        }

        function triggerResetView() {
            if (isCropModeActive) cancelCrop(); 
            
            zoomScale = defaultFitScale; 
            panOffset = { x: 0, y: 0 };
            applyZoomPanStyle();
        }

        view_window.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = zoomScale * 0.15; 
            if (e.deltaY < 0) {
                zoomScale = Math.min(zoomScale + zoomFactor, defaultFitScale * 5.0); 
            } else {
                zoomScale = Math.max(zoomScale - zoomFactor, defaultFitScale); 
            }
            applyZoomPanStyle();
        }, { passive: false });

        // --- SISTEM WARP CROP BEBAS (DENGAN PILIHAN RASIO FINAL) ---
        function startCropMode() {
            if (isSettingsOpen) toggleSettingsPanel(); // Tutup panel setting
            isCropModeActive = true;
            cropUndoStack = []; 
            cropRedoStack = [];
            updateCropHistoryButtons();

            document.getElementById('editor-title-status').innerText = "Warp Mode Aktif";
            document.getElementById('normal-editor-tools').classList.add('hidden');
            document.getElementById('action-download-panel').classList.add('hidden');
            document.getElementById('crop-active-tools').classList.remove('hidden');

            const ratioSelect = document.getElementById('crop-ratio');
            updateCropRatio(ratioSelect.value, true); 
        }

        function updateCropRatio(ratioValue, isInit = false) {
            if (!isCropModeActive) return;
            
            if (!isInit) saveCropState(); 
            
            const w = canvas.width; 
            const h = canvas.height;
            const ratio = parseFloat(ratioValue);

            let boxW = w * 0.7;
            let boxH = boxW * ratio; 

            if (boxH > h * 0.8) {
                boxH = h * 0.8;
                boxW = boxH / ratio;
            }

            const cx = w / 2; 
            const cy = h / 2;

            warpCorners[0] = { x: cx - boxW/2, y: cy - boxH/2 }; // Top-Left
            warpCorners[1] = { x: cx + boxW/2, y: cy - boxH/2 }; // Top-Right
            warpCorners[2] = { x: cx + boxW/2, y: cy + boxH/2 }; // Bottom-Right
            warpCorners[3] = { x: cx - boxW/2, y: cy + boxH/2 }; // Bottom-Left

            drawUIOverlay(); 
        }

        function cancelCrop() {
            isCropModeActive = false;
            cropUndoStack = [];
            cropRedoStack = [];
            document.getElementById('editor-title-status').innerText = "Scanner Preview";
            document.getElementById('normal-editor-tools').classList.remove('hidden');
            document.getElementById('action-download-panel').classList.remove('hidden');
            document.getElementById('crop-active-tools').classList.add('hidden');
            
            drawUIOverlay(); 
        }

        function applyWarpCrop() {
            isCropModeActive = false;
            ai_loading.classList.remove('hidden');

            setTimeout(() => {
                const ratioSelect = document.getElementById('crop-ratio');
                const selectedRatio = parseFloat(ratioSelect.value);

                const outW = 1080; 
                const outH = Math.round(outW * selectedRatio); 
                const warpCanvas = document.createElement('canvas');
                warpCanvas.width = outW; warpCanvas.height = outH;
                const wCtx = warpCanvas.getContext('2d');

                const srcPixels = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const dstData = wCtx.createImageData(outW, outH);
                const p0 = warpCorners[0], p1 = warpCorners[1], p2 = warpCorners[2], p3 = warpCorners[3];

                for (let y = 0; y < outH; y++) {
                    let v = y / outH;
                    for (let x = 0; x < outW; x++) {
                        let u = x / outW;
                        let srcX = Math.round((1-u)*(1-v)*p0.x + u*(1-v)*p1.x + u*v*p2.x + (1-u)*v*p3.x);
                        let srcY = Math.round((1-u)*(1-v)*p0.y + u*(1-v)*p1.y + u*v*p2.y + (1-u)*v*p3.y);

                        srcX = Math.max(0, Math.min(srcX, canvas.width - 1));
                        srcY = Math.max(0, Math.min(srcY, canvas.height - 1));
                        let srcIdx = (srcY * canvas.width + srcX) * 4;
                        let dstIdx = (y * outW + x) * 4;

                        dstData.data[dstIdx]   = srcPixels.data[srcIdx];
                        dstData.data[dstIdx+1] = srcPixels.data[srcIdx+1];
                        dstData.data[dstIdx+2] = srcPixels.data[srcIdx+2];
                        dstData.data[dstIdx+3] = srcPixels.data[srcIdx+3];
                    }
                }
                wCtx.putImageData(dstData, 0, 0);

                img_obj = new Image();
                img_obj.onload = function() {
                    rotationAngle = 0;
                    document.getElementById('normal-editor-tools').classList.remove('hidden');
                    document.getElementById('action-download-panel').classList.remove('hidden');
                    document.getElementById('crop-active-tools').classList.add('hidden');
                    document.getElementById('editor-title-status').innerText = "Scanner Preview";
                    
                    renderFinalOutput();
                    calculateAndSetInitialFitScale(); 
                    saveStateToHistory(); 
                    ai_loading.classList.add('hidden');
                };
                img_obj.src = warpCanvas.toDataURL('image/jpeg', 1.0);
            }, 60);
        }

        // --- CORE ENGINE RENDERING & CORE PROCESSING ---
        function renderFinalOutput(skipCoreProcessing = false) {
            if(!img_obj || typeof v_i_c !== 'function' || !v_i_c()) return;

            const isRotatedOrtho = (rotationAngle === 90 || rotationAngle === 270);
            let displayW = isRotatedOrtho ? img_obj.height : img_obj.width;
            let displayH = isRotatedOrtho ? img_obj.width : img_obj.height;

            const max_h = 2400; 
            if (displayH > max_h) { const sc = max_h / displayH; displayH = max_h; displayW = displayW * sc; }

            canvas.width = displayW; canvas.height = displayH;
            overlayCanvas.width = displayW; overlayCanvas.height = displayH;

            ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(displayW / 2, displayH / 2);
            ctx.rotate((rotationAngle * Math.PI) / 180);
            if (isRotatedOrtho) ctx.drawImage(img_obj, -displayH / 2, -displayW / 2, displayH, displayW);
            else ctx.drawImage(img_obj, -displayW / 2, -displayH / 2, displayW, displayH);
            ctx.restore();

            // Jika load dari history, data pixel sdh matang, tidak perlu diapply efek lagi
            if (!skipCoreProcessing) {
                // Tarik nilai setting dari UI
                const sharpness = parseInt(document.getElementById('setting-sharpness').value);
                const isBW = document.getElementById('setting-bw').checked;
                
                // 1. Jalankan Auto Brighten & Contrast Default
                applyBrightenAndContrast(0, 0, canvas.width, canvas.height);
                
                // 2. Jika tajam diaktifkan (>0), jalankan algoritma konvolusi
                if (sharpness > 0) applySharpness(sharpness);
                
                // 3. Jika B&W aktif, konversi terakhir
                if (isBW) applyBlackAndWhite();
            }
            
            drawUIOverlay(); 
        }

        // ALGORITMA 1: Kecerahan & Kontras Otomatis (Untuk Dokumen Kusam)
        function applyBrightenAndContrast(x, y, w, h) {
            try {
                const img_d = ctx.getImageData(x, y, w, h);
                const pix = img_d.data;
                let total_l = 0; let count = 0;
                for (let i = 0; i < pix.length; i += 16) { total_l += (0.299 * pix[i] + 0.587 * pix[i+1] + 0.114 * pix[i+2]); count++; }
                const avg_l = total_l / count;
                let b_adj = 15; let c_adj = 1.15; 
                if (avg_l < 120) { b_adj = (120 - avg_l) * 0.45; c_adj = 1.25; }
                
                const fact = (259 * (c_adj + 255)) / (255 * (259 - c_adj));
                for (let i = 0; i < pix.length; i += 4) {
                    pix[i]   = fact * (pix[i] + b_adj - 128) + 128; 
                    pix[i+1] = fact * (pix[i+1] + b_adj - 128) + 128; 
                    pix[i+2] = fact * (pix[i+2] + b_adj - 128) + 128; 
                }
                ctx.putImageData(img_d, x, y);
            } catch (e) {}
        }

        // ALGORITMA 2: Ketajaman / Sharpness (Konvolusi Kernel)
        function applySharpness(intensity) {
            const w = canvas.width;
            const h = canvas.height;
            const weights = [0, -1, 0, -1, 5, -1, 0, -1, 0]; // Unsharp mask kernel
            const katet = Math.round(Math.sqrt(weights.length));
            const half = (katet * 0.5) | 0;
            const dstData = ctx.createImageData(w, h);
            const dstPixels = dstData.data;
            const srcPixels = ctx.getImageData(0, 0, w, h).data;

            // Hitung faktor mix berdasarkan intensitas slider (0-100)
            const mix = intensity / 100;

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const sy = y; const sx = x;
                    const dstOff = (y * w + x) * 4;
                    let r = 0, g = 0, b = 0;

                    // Lakukan operasi konvolusi pada pixel tetangga
                    for (let cy = 0; cy < katet; cy++) {
                        for (let cx = 0; cx < katet; cx++) {
                            const scy = sy + cy - half;
                            const scx = sx + cx - half;
                            if (scy >= 0 && scy < h && scx >= 0 && scx < w) {
                                const srcOff = (scy * w + scx) * 4;
                                const wt = weights[cy * katet + cx];
                                r += srcPixels[srcOff] * wt;
                                g += srcPixels[srcOff + 1] * wt;
                                b += srcPixels[srcOff + 2] * wt;
                            }
                        }
                    }

                    // Terapkan hasil tajam dicampur dengan gambar asli berdasarkan intensitas
                    dstPixels[dstOff]     = r * mix + srcPixels[dstOff] * (1 - mix);
                    dstPixels[dstOff + 1] = g * mix + srcPixels[dstOff + 1] * ( mixing = 1 - mix);
                    dstPixels[dstOff + 2] = b * mix + srcPixels[dstOff + 2] * (1 - mix);
                    dstPixels[dstOff + 3] = srcPixels[dstOff + 3]; // Alpha tetap
                }
            }
            ctx.putImageData(dstData, 0, 0);
        }

        // ALGORITMA 3: Black and White Dokumen (Grayscale Luminositas)
        function applyBlackAndWhite() {
            const img_d = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pix = img_d.data;
            for (let i = 0; i < pix.length; i += 4) {
                // Formula standar ITU-R BT.601 untuk persepsi kecerahan mata manusia
                const grayscale = 0.299 * pix[i] + 0.587 * pix[i + 1] + 0.114 * pix[i + 2];
                // Set R, G, B ke nilai yang sama untuk hasil abu-abu
                pix[i] = pix[i + 1] = pix[i + 2] = grayscale;
            }
            ctx.putImageData(img_d, 0, 0);
        }

        // --- SISTEM OVERLAY UI ---
        function drawUIOverlay() {
            oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            
            if (!isCropModeActive) return;

            oCtx.strokeStyle = "#A855F7"; oCtx.lineWidth = 6;
            oCtx.beginPath();
            oCtx.moveTo(warpCorners[0].x, warpCorners[0].y); oCtx.lineTo(warpCorners[1].x, warpCorners[1].y);
            oCtx.lineTo(warpCorners[2].x, warpCorners[2].y); oCtx.lineTo(warpCorners[3].x, warpCorners[3].y);
            oCtx.closePath(); oCtx.stroke();

            oCtx.fillStyle = "rgba(0,0,0,0.65)";
            oCtx.beginPath();
            oCtx.moveTo(0,0); oCtx.lineTo(overlayCanvas.width,0); oCtx.lineTo(overlayCanvas.width,overlayCanvas.height); oCtx.lineTo(0,overlayCanvas.height);
            oCtx.moveTo(warpCorners[0].x, warpCorners[0].y); oCtx.lineTo(warpCorners[3].x, warpCorners[3].y);
            oCtx.lineTo(warpCorners[2].x, warpCorners[2].y); oCtx.lineTo(warpCorners[1].x, warpCorners[1].y);
            oCtx.closePath(); oCtx.fill("evenodd");

            warpCorners.forEach((corner, idx) => {
                oCtx.fillStyle = idx === activeCornerIndex ? "#EC4899" : "#A855F7"; 
                oCtx.beginPath(); oCtx.arc(corner.x, corner.y, cornerHandleRadius, 0, 2 * Math.PI); oCtx.fill();
                oCtx.strokeStyle = "#FFFFFF"; oCtx.lineWidth = 3; oCtx.stroke();
            });
        }

        // --- SISTEM INPUT GESTUR PEMETAAN KOORDINAT ---
        function isPointInPoly(pt, poly) {
            let inside = false;
            for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                let xi = poly[i].x, yi = poly[i].y;
                let xj = poly[j].x, yj = poly[j].y;
                let intersect = ((yi > pt.y) !== (yj > pt.y)) && (pt.x < (xj - xi) * (pt.y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function getCanvasMousePos(e) {
            const rect = overlayCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            return {
                x: ((clientX - rect.left) / rect.width) * overlayCanvas.width,
                y: ((clientY - rect.top) / rect.height) * overlayCanvas.height,
                rawX: clientX, rawY: clientY
            };
        }

        view_window.addEventListener('mousedown', (e) => {
            if (isSettingsOpen) {
                // Tutup panel setting jika user klik di luar panel (area preview)
                if (!e.target.closest('#settings-panel') && !e.target.closest('#btn-global-settings')) {
                    toggleSettingsPanel();
                }
            }

            const pos = getCanvasMousePos(e);
            
            if (isCropModeActive) {
                activeCornerIndex = -1;
                warpCorners.forEach((c, idx) => { if (Math.hypot(pos.x - c.x, pos.y - c.y) < cornerHandleRadius * 4) activeCornerIndex = idx; });
                
                if (activeCornerIndex !== -1) {
                    isCropStateSavedForDrag = false;
                    return; 
                }
                
                if (isPointInPoly(pos, warpCorners)) {
                    isDraggingWholeCrop = true;
                    lastCropDragPos = { x: pos.x, y: pos.y };
                    isCropStateSavedForDrag = false;
                    return; 
                }
            }
            
            isPanningView = true;
            panStart.x = pos.rawX - panOffset.x; panStart.y = pos.rawY - panOffset.y;
        });

        view_window.addEventListener('mousemove', (e) => {
            const pos = getCanvasMousePos(e);
            
            if (isCropModeActive && activeCornerIndex !== -1) {
                if (!isCropStateSavedForDrag) { saveCropState(); isCropStateSavedForDrag = true; }
                warpCorners[activeCornerIndex].x = Math.max(0, Math.min(pos.x, overlayCanvas.width));
                warpCorners[activeCornerIndex].y = Math.max(0, Math.min(pos.y, overlayCanvas.height));
                drawUIOverlay(); 
                return;
            }
            
            if (isCropModeActive && isDraggingWholeCrop) {
                if (!isCropStateSavedForDrag) { saveCropState(); isCropStateSavedForDrag = true; }
                let dx = pos.x - lastCropDragPos.x;
                let dy = pos.y - lastCropDragPos.y;
                
                let canMoveX = true; let canMoveY = true;
                for(let c of warpCorners) {
                    if (c.x + dx < 0 || c.x + dx > overlayCanvas.width) canMoveX = false;
                    if (c.y + dy < 0 || c.y + dy > overlayCanvas.height) canMoveY = false;
                }
                
                if (canMoveX) warpCorners.forEach(c => c.x += dx);
                if (canMoveY) warpCorners.forEach(c => c.y += dy);
                
                lastCropDragPos = { x: pos.x, y: pos.y };
                drawUIOverlay();
                return;
            }
            
            if (isPanningView) {
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                panOffset.x = cx - panStart.x; panOffset.y = cy - panStart.y;
                applyZoomPanStyle(); 
            }
        });

        window.addEventListener('mouseup', () => { 
            isPanningView = false; 
            activeCornerIndex = -1; 
            isDraggingWholeCrop = false;
        });

        view_window.addEventListener('touchstart', (e) => {
            if (isSettingsOpen && !e.target.closest('#settings-panel') && !e.target.closest('#btn-global-settings')) {
                 toggleSettingsPanel();
            }

            if (e.touches.length === 2) {
                initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            } else {
                const pos = getCanvasMousePos(e);
                if (isCropModeActive) {
                    activeCornerIndex = -1;
                    warpCorners.forEach((c, idx) => { if (Math.hypot(pos.x - c.x, pos.y - c.y) < cornerHandleRadius * 5) activeCornerIndex = idx; });
                    
                    if (activeCornerIndex !== -1) { 
                        isCropStateSavedForDrag = false;
                        e.preventDefault(); return; 
                    }
                    
                    if (isPointInPoly(pos, warpCorners)) {
                        isDraggingWholeCrop = true;
                        lastCropDragPos = { x: pos.x, y: pos.y };
                        isCropStateSavedForDrag = false;
                        e.preventDefault(); return;
                    }
                }
                isPanningView = true;
                panStart.x = pos.rawX - panOffset.x; panStart.y = pos.rawY - panOffset.y;
            }
        }, { passive: false });

        view_window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialPinchDist) {
                e.preventDefault();
                const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const scaleDiff = currentDist / initialPinchDist;
                const zoomChange = (scaleDiff - 1) * zoomScale * 0.8;
                zoomScale = Math.max(defaultFitScale, Math.min(zoomScale + zoomChange, defaultFitScale * 5.0)); 
                initialPinchDist = currentDist;
                applyZoomPanStyle();
            } else if (e.touches.length === 1) {
                const pos = getCanvasMousePos(e);
                
                if (isCropModeActive && activeCornerIndex !== -1) {
                    if (!isCropStateSavedForDrag) { saveCropState(); isCropStateSavedForDrag = true; }
                    e.preventDefault();
                    warpCorners[activeCornerIndex].x = Math.max(0, Math.min(pos.x, overlayCanvas.width));
                    warpCorners[activeCornerIndex].y = Math.max(0, Math.min(pos.y, overlayCanvas.height));
                    drawUIOverlay(); 
                    return;
                }
                
                if (isCropModeActive && isDraggingWholeCrop) {
                    if (!isCropStateSavedForDrag) { saveCropState(); isCropStateSavedForDrag = true; }
                    e.preventDefault();
                    let dx = pos.x - lastCropDragPos.x;
                    let dy = pos.y - lastCropDragPos.y;
                    
                    let canMoveX = true; let canMoveY = true;
                    for(let c of warpCorners) {
                        if (c.x + dx < 0 || c.x + dx > overlayCanvas.width) canMoveX = false;
                        if (c.y + dy < 0 || c.y + dy > overlayCanvas.height) canMoveY = false;
                    }
                    
                    if (canMoveX) warpCorners.forEach(c => c.x += dx);
                    if (canMoveY) warpCorners.forEach(c => c.y += dy);
                    
                    lastCropDragPos = { x: pos.x, y: pos.y };
                    drawUIOverlay();
                    return;
                }

                if (isPanningView) {
                    panOffset.x = pos.rawX - panStart.x; panOffset.y = pos.rawY - panStart.y;
                    applyZoomPanStyle(); 
                }
            }
        }, { passive: false });

        view_window.addEventListener('touchend', () => { 
            isPanningView = false; 
            activeCornerIndex = -1; 
            isDraggingWholeCrop = false;
            initialPinchDist = null; 
        });

        // --- GENERATE PDF ---
        function t1_d_p() {
            try { if(!v_i_c() || typeof v_i_c !== 'function') return; } catch(e) { return; }

            if (isCropModeActive) cancelCrop();
            if (isSettingsOpen) toggleSettingsPanel(); // Tutup setting

            const compressMode = document.getElementById('compress-level').value;
            let exportQuality = 0.98; 
            let exportScaleFactor = 1.0; 

            if (compressMode === 'med') { exportQuality = 0.80; exportScaleFactor = 0.65; }
            else if (compressMode === 'low') { exportQuality = 0.60; exportScaleFactor = 0.40; }

            let targetExportCanvas = canvas;
            if (exportScaleFactor < 1.0) {
                targetExportCanvas = document.createElement('canvas');
                targetExportCanvas.width = canvas.width * exportScaleFactor;
                targetExportCanvas.height = canvas.height * exportScaleFactor;
                const txCtx = targetExportCanvas.getContext('2d');
                txCtx.drawImage(canvas, 0, 0, targetExportCanvas.width, targetExportCanvas.height);
            }

            const i_d = targetExportCanvas.toDataURL('image/jpeg', exportQuality);
            const { jsPDF } = window.jspdf;
            
            const pdfWidth = targetExportCanvas.width;
            const pdfHeight = targetExportCanvas.height;
            const orientation = pdfWidth > pdfHeight ? 'l' : 'p';
            
            const pdf = new jsPDF({ orientation: orientation, unit: 'px', format: [pdfWidth, pdfHeight] });

            pdf.addImage(i_d, 'JPEG', 0, 0, pdfWidth, pdfHeight);
            pdf.save('Scanned_'+Date.now()+'.pdf');
        }
    </script>
