    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #111029, #05030a);
        }
        .ai-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
        .ai-glow-strong { box-shadow: 0 0 30px rgba(168, 85, 247, 0.4); }
        
        #camera-feed { object-fit: cover; }
        .mirror-view { transform: scaleX(-1); }
        
        /* Wadah preview menggunakan Flexbox untuk Centering Sempurna */
        .preview-window {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 480px;
            background: #06060c; 
            border-radius: 1rem;
            border: 1px solid #1f2937;
        }
        
        /* Kontainer Kanvas Relatif */
        .canvas-container {
            position: relative;
            transform-origin: center center;
            user-select: none;
            touch-action: none;
            cursor: grab;
            transition: transform 0.05s ease-out; /* Animasi halus saat dilepas */
        }
        .canvas-container:active { cursor: grabbing; transition: none; }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between">

                <div class="w-16 h-16 bg-purple-950/50 rounded-2xl flex items-center justify-center mx-auto mb-5 border border-purple-500/30 group-hover:scale-110 transition">
                    <i class="fa-solid fa-camera text-3xl text-purple-400"></i>

                    <i class="fa-solid fa-arrow-rotate-right text-emerald-400 text-base"></i>

            <div class="grid grid-cols-2 gap-3 mb-5 hidden" id="crop-active-tools">

                    <i class="fa-solid fa-ban"></i> Batal

                <button onclick="applyWarpCrop()" class="bg-purple-600 hover:bg-purple-500 text-white p-3 rounded-xl transition text-sm font-bold cursor-pointer flex items-center justify-center gap-2 border border-purple-400">
                    <i class="fa-solid fa-check-double"></i> Selesai

                        <option value="hd">Asli</option>
                        <option value="med">Medium (~1 MB)</option>
                        <option value="low">Rendah (< 500 KB)</option>
                    </select>
                </div>
                <button id="btn-pdf" onclick="t1_d_p()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition shadow-lg shadow-indigo-500/20 cursor-pointer text-sm tracking-wide">

    </main>

    <script>

        if(!v_i_c()) { document.body.innerHTML = '<div style="color:white;text-align:center;margin-top:100px;font-family:sans-serif;"><h1>APP_CORRUPTED_ERROR_0xCR</h1><p>Integritas kode rusak.</p></div>'; throw "StopJS"; }
        // ===========================================

        let img_obj = null;
        let stream_ptr = null; 
        let currentFacingMode = "environment"; 
        
        // State Rotasi & Crop
        let rotationAngle = 0; 
        let isCropModeActive = false;
        let warpCorners = [{x:0,y:0}, {x:0,y:0}, {x:0,y:0}, {x:0,y:0}];
        let activeCornerIndex = -1;
        const cornerHandleRadius = 16; 

        // MANAJEMEN RIWAYAT UNDO / REDO
        let undoStack = [];
        let redoStack = [];
        const maxHistorySize = 15;

        // Viewport Zoom & Pan
        let zoomScale = 1.0;
        let defaultFitScale = 1.0;

        let panStart = { x: 0, y: 0 };

        // Deklarasi Elemen
        const zone_choice = document.getElementById('choice-zone');
        const zone_camera = document.getElementById('camera-zone');
        const zone_preview = document.getElementById('preview-zone');
        const video_feed = document.getElementById('camera-feed');
        const canvas = document.getElementById('output-canvas');
        const ctx = canvas.getContext('2d');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const oCtx = overlayCanvas.getContext('2d');
        const canvas_wrap = document.getElementById('canvas-wrap');
        const view_window = document.getElementById('view-window');
        const ai_loading = document.getElementById('ai-loading');

        // --- SISTEM KAMERA & UPLOAD ---
        function resetApp() {
            stopCamera();
            img_obj = null;
            rotationAngle = 0;
            isCropModeActive = false;
            undoStack = [];
            redoStack = [];
            updateHistoryButtons();
            document.getElementById('file-input').value = "";
            document.getElementById('normal-editor-tools').classList.remove('hidden');
            document.getElementById('crop-active-tools').classList.add('hidden');
            document.getElementById('editor-title-status').innerText = "AI Scanner Preview";
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            
            zone_choice.classList.remove('hidden');
            zone_camera.classList.add('hidden');
            zone_preview.classList.add('hidden');
        }

        async function startCamera() {
            if(!v_i_c() || _0xcr_k !== "Q29kZU9uIGJ5X3JpZHdhbg==") { window.location.reload(); return; }
            zone_choice.classList.add('hidden');
            zone_camera.classList.remove('hidden');
            if (stream_ptr) stopCamera();

            if (currentFacingMode === "user") video_feed.classList.add('mirror-view');
            else video_feed.classList.remove('mirror-view');

            try {
                stream_ptr = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false 
                });
                video_feed.srcObject = stream_ptr;
            } catch (err) {
                alert("Gagal mengakses kamera.\nError: " + err.message);
                resetApp();
            }
        }

        function switchCamera() {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            startCamera();
        }

        function stopCamera() {
            if (stream_ptr) { stream_ptr.getTracks().forEach(track => track.stop()); stream_ptr = null; video_feed.srcObject = null; }
        }

        function takePhoto() {
            const temp_canvas = document.createElement('canvas');
            temp_canvas.width = video_feed.videoWidth; temp_canvas.height = video_feed.videoHeight;
            const temp_ctx = temp_canvas.getContext('2d');
            temp_ctx.save();
            if (currentFacingMode === "user") { temp_ctx.translate(temp_canvas.width, 0); temp_ctx.scale(-1, 1); }
            temp_ctx.drawImage(video_feed, 0, 0, temp_canvas.width, temp_canvas.height);
            temp_ctx.restore();

            img_obj = new Image();
            img_obj.onload = function() {
                stopCamera();
                zone_camera.classList.add('hidden'); 
                zone_preview.classList.remove('hidden');
                
                renderFinalOutput();
                calculateAndSetInitialFitScale(); 
                saveStateToHistory(); 
            };
            img_obj.src = temp_canvas.toDataURL('image/jpeg', 1.0);
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                img_obj = new Image();
                img_obj.onload = function() {
                    zone_choice.classList.add('hidden'); 
                    zone_preview.classList.remove('hidden');
                    
                    renderFinalOutput();
                    calculateAndSetInitialFitScale(); 
                    saveStateToHistory(); 
                };
                img_obj.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // --- SISTEM UNDO REDO YANG AMAN ---
        function saveStateToHistory() {
            if (!canvas) return;
            if (undoStack.length >= maxHistorySize) undoStack.shift();
            
            // output-canvas terjamin BERSIH tanpa garis ungu (karena garis ungu ada di overlayCanvas)
            undoStack.push({ imageSrc: canvas.toDataURL('image/jpeg', 1.0) });
            
            redoStack = []; 
            updateHistoryButtons();
        }

        function undo() {
            if (undoStack.length <= 1) return; // Menyisakan 1 state orisinil paling bawah
            if (isCropModeActive) cancelCrop();

            const currentState = undoStack.pop();
            redoStack.push(currentState);
            
            const previousState = undoStack[undoStack.length - 1];
            loadStateFromHistory(previousState);
        }

        function redo() {
            if (redoStack.length === 0) return;
            if (isCropModeActive) cancelCrop();

            const nextState = redoStack.pop();
            undoStack.push(nextState);
            loadStateFromHistory(nextState);
        }

        function loadStateFromHistory(stateObj) {
            ai_loading.classList.remove('hidden');
            img_obj = new Image();
            img_obj.onload = function() {
                rotationAngle = 0; // Rotasi sdh matang pada layer gambar history
                renderFinalOutput();
                calculateAndSetInitialFitScale(); 
                updateHistoryButtons();
                ai_loading.classList.add('hidden');
            };
            img_obj.src = stateObj.imageSrc;
        }

        function updateHistoryButtons() {
            document.getElementById('btn-undo').disabled = (undoStack.length <= 1);
            document.getElementById('btn-redo').disabled = (redoStack.length === 0);
        }

        function rotateImage() {
            if (isCropModeActive) cancelCrop(); 
            rotationAngle = (rotationAngle + 90) % 360;
            renderFinalOutput();
            calculateAndSetInitialFitScale(); 
            saveStateToHistory();
        }

        // --- ZOOM & PAN (FLEXBOX CENTERING & CLAMPING) ---
        function applyZoomPanStyle() {
            const winW = view_window.clientWidth; 
            const winH = view_window.clientHeight;
            const scaledW = canvas.width * zoomScale; 
            const scaledH = canvas.height * zoomScale;
            
            // Clamping Batas Geser Maksimal (Mencegah bolong hitam di luar objek)
            const maxPanX = Math.max(0, (scaledW - winW) / 2);
            const maxPanY = Math.max(0, (scaledH - winH) / 2);

            panOffset.x = Math.max(-maxPanX, Math.min(maxPanX, panOffset.x));
            panOffset.y = Math.max(-maxPanY, Math.min(maxPanY, panOffset.y));

            // Flexbox Center + Offset Translate
            canvas_wrap.style.transform = `translate(${panOffset.x}px, ${panOffset.y}px) scale(${zoomScale})`;
        }

        function calculateAndSetInitialFitScale() {
            const winW = view_window.clientWidth; 
            const winH = view_window.clientHeight;
            const scaleW = winW / canvas.width; 
            const scaleH = winH / canvas.height;
            
            // 0.95 agar ada margin 5% dari tepi kotak preview, tidak kepotong/kelewat zoom
            defaultFitScale = Math.min(scaleW, scaleH) * 0.95; 
            zoomScale = defaultFitScale;
            panOffset = { x: 0, y: 0 };
            applyZoomPanStyle();
        }

        function triggerResetView() {
            if (isCropModeActive) cancelCrop(); // Otomatis tutup mode crop
            
            zoomScale = defaultFitScale; 
            panOffset = { x: 0, y: 0 };
            applyZoomPanStyle();
        }

        view_window.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = zoomScale * 0.15; 
            if (e.deltaY < 0) {
                zoomScale = Math.min(zoomScale + zoomFactor, defaultFitScale * 5.0); 
            } else {
                zoomScale = Math.max(zoomScale - zoomFactor, defaultFitScale); // Tidak boleh lebih kecil dari fit layar
            }
            applyZoomPanStyle();
        }, { passive: false });

        // --- SISTEM WARP CROP BEBAS ---

            document.getElementById('editor-title-status').innerText = "Warp Mode - Geser 4 Sudut Kertas";
            document.getElementById('normal-editor-tools').classList.add('hidden');
            document.getElementById('crop-active-tools').classList.remove('hidden');

            const w = canvas.width; const h = canvas.height;
            warpCorners[0] = { x: w * 0.1, y: h * 0.1 }; 
            warpCorners[1] = { x: w * 0.9, y: h * 0.1 }; 
            warpCorners[2] = { x: w * 0.9, y: h * 0.9 }; 
            warpCorners[3] = { x: w * 0.1, y: h * 0.9 }; 

            drawUIOverlay(); // Panggil fungsi draw untuk memunculkan garis ungu di Overlay
        }

        function cancelCrop() {
            isCropModeActive = false;
            document.getElementById('editor-title-status').innerText = "AI Scanner Preview";
            document.getElementById('normal-editor-tools').classList.remove('hidden');
            document.getElementById('crop-active-tools').classList.add('hidden');
            
            drawUIOverlay(); // Karena isCropModeActive False, fungsi ini akan membersihkan garis ungu

                    renderFinalOutput();

                    saveStateToHistory();

            let displayH = isRotatedOrtho ? img_obj.width : img_obj.height;

            const max_h = 2000; 
            if (displayH > max_h) { const sc = max_h / displayH; displayH = max_h; displayW = displayW * sc; }

            canvas.width = displayW; canvas.height = displayH;
            overlayCanvas.width = displayW; overlayCanvas.height = displayH;

            ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(displayW / 2, displayH / 2);
            ctx.rotate((rotationAngle * Math.PI) / 180);
            if (isRotatedOrtho) ctx.drawImage(img_obj, -displayH / 2, -displayW / 2, displayH, displayW);
            else ctx.drawImage(img_obj, -displayW / 2, -displayH / 2, displayW, displayH);
            ctx.restore();

            applyBrightenAndContrast(0, 0, canvas.width, canvas.height);
            drawUIOverlay(); 
        }

        function applyBrightenAndContrast(x, y, w, h) {
            try {
                const img_d = ctx.getImageData(x, y, w, h);
                const pix = img_d.data;
                let total_l = 0; let count = 0;
                for (let i = 0; i < pix.length; i += 16) { total_l += (0.299 * pix[i] + 0.587 * pix[i+1] + 0.114 * pix[i+2]); count++; }
                const avg_l = total_l / count;
                let b_adj = 15; let c_adj = 1.15; 
                if (avg_l < 120) { b_adj = (120 - avg_l) * 0.45; c_adj = 1.25; }
                
                const fact = (259 * (c_adj + 255)) / (255 * (259 - c_adj));
                for (let i = 0; i < pix.length; i += 4) {
                    pix[i]   = fact * (pix[i] + b_adj - 128) + 128; 
                    pix[i+1] = fact * (pix[i+1] + b_adj - 128) + 128; 
                    pix[i+2] = fact * (pix[i+2] + b_adj - 128) + 128; 
                }
                ctx.putImageData(img_d, x, y);
            } catch (e) {}
        }

        // PENTING: Semua garis interaktif murni digambar di oCtx (Overlay Canvas)
        function drawUIOverlay() {
            oCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            
            if (!isCropModeActive) return;

            oCtx.strokeStyle = "#A855F7"; oCtx.lineWidth = 6;
            oCtx.beginPath();
            oCtx.moveTo(warpCorners[0].x, warpCorners[0].y); oCtx.lineTo(warpCorners[1].x, warpCorners[1].y);
            oCtx.lineTo(warpCorners[2].x, warpCorners[2].y); oCtx.lineTo(warpCorners[3].x, warpCorners[3].y);
            oCtx.closePath(); oCtx.stroke();

            oCtx.fillStyle = "rgba(0,0,0,0.65)";
            oCtx.beginPath();
            oCtx.moveTo(0,0); oCtx.lineTo(overlayCanvas.width,0); oCtx.lineTo(overlayCanvas.width,overlayCanvas.height); oCtx.lineTo(0,overlayCanvas.height);
            oCtx.moveTo(warpCorners[0].x, warpCorners[0].y); oCtx.lineTo(warpCorners[3].x, warpCorners[3].y);
            oCtx.lineTo(warpCorners[2].x, warpCorners[2].y); oCtx.lineTo(warpCorners[1].x, warpCorners[1].y);
            oCtx.closePath(); oCtx.fill("evenodd");

            warpCorners.forEach((corner, idx) => {
                oCtx.fillStyle = idx === activeCornerIndex ? "#EC4899" : "#A855F7"; 
                oCtx.beginPath(); oCtx.arc(corner.x, corner.y, cornerHandleRadius, 0, 2 * Math.PI); oCtx.fill();
                oCtx.strokeStyle = "#FFFFFF"; oCtx.lineWidth = 3; oCtx.stroke();
            });
        }

        // --- SISTEM INPUT GESTUR PEMETAAN KOORDINAT ---
        function getCanvasMousePos(e) {
            const rect = overlayCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            return {
                x: ((clientX - rect.left) / rect.width) * overlayCanvas.width,
                y: ((clientY - rect.top) / rect.height) * overlayCanvas.height,
                rawX: clientX, rawY: clientY
            };
        }

        view_window.addEventListener('mousedown', (e) => {
            const pos = getCanvasMousePos(e);
            if (isCropModeActive) {
                activeCornerIndex = -1;
                warpCorners.forEach((c, idx) => { if (Math.hypot(pos.x - c.x, pos.y - c.y) < cornerHandleRadius * 4) activeCornerIndex = idx; });
                if (activeCornerIndex !== -1) return;
            }
            isPanningView = true;
            panStart.x = pos.rawX - panOffset.x; panStart.y = pos.rawY - panOffset.y;
        });

        view_window.addEventListener('mousemove', (e) => {
            const pos = getCanvasMousePos(e);
            if (isCropModeActive && activeCornerIndex !== -1) {
                warpCorners[activeCornerIndex].x = Math.max(0, Math.min(pos.x, overlayCanvas.width));
                warpCorners[activeCornerIndex].y = Math.max(0, Math.min(pos.y, overlayCanvas.height));
                drawUIOverlay(); // Hanya update overlay, hemat memori
                return;
            }
            if (isPanningView) {
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                panOffset.x = cx - panStart.x; panOffset.y = cy - panStart.y;
                applyZoomPanStyle(); 
            }
        });

        window.addEventListener('mouseup', () => { isPanningView = false; activeCornerIndex = -1; });

        view_window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            } else {
                const pos = getCanvasMousePos(e);
                if (isCropModeActive) {
                    activeCornerIndex = -1;
                    warpCorners.forEach((c, idx) => { if (Math.hypot(pos.x - c.x, pos.y - c.y) < cornerHandleRadius * 5) activeCornerIndex = idx; });
                    if (activeCornerIndex !== -1) { e.preventDefault(); return; }
                }
                isPanningView = true;
                panStart.x = pos.rawX - panOffset.x; panStart.y = pos.rawY - panOffset.y;
            }
        }, { passive: false });

        view_window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialPinchDist) {
                e.preventDefault();
                const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const scaleDiff = currentDist / initialPinchDist;
                const zoomChange = (scaleDiff - 1) * zoomScale * 0.8;
                zoomScale = Math.max(defaultFitScale, Math.min(zoomScale + zoomChange, defaultFitScale * 5.0)); 
                initialPinchDist = currentDist;
                applyZoomPanStyle();
            } else if (e.touches.length === 1) {
                const pos = getCanvasMousePos(e);
                if (isCropModeActive && activeCornerIndex !== -1) {
                    e.preventDefault();
                    warpCorners[activeCornerIndex].x = Math.max(0, Math.min(pos.x, overlayCanvas.width));
                    warpCorners[activeCornerIndex].y = Math.max(0, Math.min(pos.y, overlayCanvas.height));
                    drawUIOverlay(); 
                    return;
                }
                if (isPanningView) {
                    panOffset.x = pos.rawX - panStart.x; panOffset.y = pos.rawY - panStart.y;
                    applyZoomPanStyle(); 
                }
            }
        }, { passive: false });

        view_window.addEventListener('touchend', () => { isPanningView = false; activeCornerIndex = -1; initialPinchDist = null; });

        // --- GENERATE PDF ---
        function t1_d_p() {
            try { if(!v_i_c() || typeof v_i_c !== 'function') return; } catch(e) { return; }

            // Jika secara tidak sengaja menekan download saat mode crop hidup, matikan mode dan bersihkan overlay
            if (isCropModeActive) cancelCrop();

            const compressMode = document.getElementById('compress-level').value;
            let exportQuality = 0.98; 
            let exportScaleFactor = 1.0; 

            if (compressMode === 'med') { exportQuality = 0.80; exportScaleFactor = 0.65; }
            else if (compressMode === 'low') { exportQuality = 0.60; exportScaleFactor = 0.40; }

            // Kanvas Murni Output sudah dijamin BERSIH karena UI berada di Overlay Canvas (oCtx).
            let targetExportCanvas = canvas;
            if (exportScaleFactor < 1.0) {
                targetExportCanvas = document.createElement('canvas');
                targetExportCanvas.width = canvas.width * exportScaleFactor;
                targetExportCanvas.height = canvas.height * exportScaleFactor;
                const txCtx = targetExportCanvas.getContext('2d');
                txCtx.drawImage(canvas, 0, 0, targetExportCanvas.width, targetExportCanvas.height);
            }

            const i_d = targetExportCanvas.toDataURL('image/jpeg', exportQuality);
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const p_w = pdf.internal.pageSize.getWidth(); const p_h = pdf.internal.pageSize.getHeight();
            const m = 4; const d_w = p_w - (m * 2); const d_h = p_w * (canvas.height / canvas.width) - (m * 2);

            let renderH = d_h; let renderW = d_w;
            if (renderH > p_h - (m * 2)) { renderH = p_h - (m * 2); renderW = renderH * (canvas.width / canvas.height); }

            pdf.addImage(i_d, 'JPEG', (p_w - renderW) / 2, (p_h - renderH) / 2, renderW, renderH);
            pdf.save('Scanned_'+Date.now()+'.pdf');
        }
    </script>
